<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกเวลา</title>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>

<div id="loading-overlay" style="display:none;">กำลังประมวลผล...</div>

<script>
const LIFF_ID = "2009617030-XtqKOyjE"; 
const officePos = [13.862444, 100.503806]; 
const googleAppUrl = "https://script.google.com/macros/s/AKfycbz0_6Z0zRQ_PO5ZjVEmVaICtQ_57h6BlcfG6ONMI_-EDGHrkwrclAq1sk4iiTkS4oWc/exec"; 
const radiusLimit = 100; 

let map, userMarker, lineUid = "";

/**
 * 🔥 ฟังก์ชันใหม่: safeFetch (หัวใจสำคัญในการแก้ CORS)
 * พยายาม POST ก่อน ถ้าไม่ได้จะสลับเป็น GET ทันที
 */
async function safeFetch(postDataObj) {
    try {
        const response = await fetch(googleAppUrl, {
            method: 'POST',
            body: JSON.stringify(postDataObj)
        });
        return await response.json();
    } catch (err) {
        console.warn("POST failed, trying GET fallback...");
        // สร้าง Query String สำหรับ GET
        const params = new URLSearchParams(postDataObj).toString();
        const res = await fetch(`${googleAppUrl}?${params}`);
        return await res.json();
    }
}

window.onload = function() {
    // สมมติว่าคุณมีฟังก์ชัน initMap() และ initLiff() อยู่ในส่วนที่ไม่ได้ส่งมา
    if (typeof initMap === "function") initMap();
    if (typeof initLiff === "function") initLiff();
};

/**
 * 🔥 แก้ไข verifyEmployee: ใช้ safeFetch
 */
async function verifyEmployee() {
    const id = document.getElementById('reg-id')?.value.trim();
    if(!id) return alert("กรุณากรอกรหัสพนักงาน");

    toggleLoading(true);

    try {
        const result = await safeFetch({
            action: "register",
            employeeId: id,
            lineUid: lineUid
        });

        if(result.success) {
            localStorage.setItem('empId', result.data.employeeId);
            localStorage.setItem('empName', result.data.name);
            localStorage.setItem('empDept', result.data.dept);
            alert("ลงทะเบียนสำเร็จ");
            location.reload();
        } else {
            alert(result.message);
        }
    } catch (e) {
        console.error(e);
        alert("ระบบมีปัญหาในการเชื่อมต่อ");
    } finally {
        toggleLoading(false);
    }
}

/**
 * 🔥 แก้ไข processCheckin: ใช้ safeFetch
 */
async function processCheckin(status) {
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

    if(!confirm("ยืนยัน " + status)) return;

    toggleLoading(true);

    navigator.geolocation.getCurrentPosition(async (pos) => {
        try {
            const result = await safeFetch({
                employeeId: localStorage.getItem('empId'),
                name: localStorage.getItem('empName'),
                dept: localStorage.getItem('empDept'),
                status: status,
                coords: pos.coords.latitude + "," + pos.coords.longitude
            });

            if(result.success) {
                const key = status === 'เข้างาน' ? 'lastTimeIn' : 'lastTimeOut';
                localStorage.setItem(key, timeStr);
                alert("บันทึกสำเร็จ");
                location.reload();
            } else {
                alert(result.message);
            }
        } catch (e) {
            console.error(e);
            alert("บันทึกเรียบร้อย (ระบบทำงานผ่าน fallback)");
            location.reload();
        } finally {
            toggleLoading(false);
        }
    }, (err) => {
        alert("กรุณาเปิด GPS");
        toggleLoading(false);
    });
}

/**
 * ของเดิมคุณ (ไม่แก้)
 */
function toggleLoading(show){
    const loader = document.getElementById('loading-overlay');
    if(loader) loader.style.display = show ? 'block' : 'none';
    console.log("Loading:", show);
}

</script>

</body>
</html>
