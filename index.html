<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>บันทึกเวลา - somboon VanAccessory</title>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #map { flex-grow: 1; width: 100%; z-index: 1; }
        .bottom-panel { background: white; padding: 15px; border-top: 1px solid #ddd; z-index: 10; text-align: center; }
        .header { background: #00796b; color: white; padding: 10px; text-align: center; font-weight: bold; }
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        input { width: 80%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; text-align: center; }
        .btn { padding: 12px 25px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; background: #00796b; }
        .hidden { display: none; }
    </style>
</head>

<body>

<div id="loading-overlay">
    <div style="border: 4px solid #f3f3f3; border-top: 4px solid #00796b; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite;"></div>
    <p>กำลังประมวลผล...</p>
</div>

<div class="header">somboon VanAccessory ลงเวลา</div>
<div id="map"></div>

<div class="bottom-panel">
    <div id="reg-section" class="hidden">
        <input type="text" id="reg-id" placeholder="ระบุรหัสพนักงาน เช่น SB001">
        <button class="btn" onclick="verifyEmployee()">เข้าสู่ระบบ</button>
    </div>
    
    <div id="checkin-section" class="hidden">
        <p>คุณ: <span id="user-name"></span></p>
        <button class="btn" id="btn-in" onclick="processCheckin('เข้างาน')">เข้างาน</button>
        <button class="btn" id="btn-out" style="background:#dc3545;" onclick="processCheckin('ออกงาน')">ออกงาน</button>
    </div>
    <p id="status-text" style="font-size: 12px; color: #666;">กำลังโหลดพิกัด...</p>
</div>

<script>
const LIFF_ID = "2009617030-XtqKOyjE"; 
const officePos = [13.862444, 100.503806]; 
const googleAppUrl = "https://script.google.com/macros/s/AKfycbz0_6Z0zRQ_PO5ZjVEmVaICtQ_57h6BlcfG6ONMI_-EDGHrkwrclAq1sk4iiTkS4oWc/exec"; 
const radiusLimit = 100; 

let map, userMarker, lineUid = "";

// ✅ ฟังก์ชันวาดแผนที่ (แก้ปัญหา initMap is not defined)
function initMap() {
    map = L.map('map').setView(officePos, 17);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.circle(officePos, { radius: radiusLimit, color: '#00796b' }).addTo(map);
    L.marker(officePos).addTo(map).bindPopup("จุดบันทึกเวลา");
}

// ✅ ฟังก์ชันเชื่อมต่อ LIFF
async function initLiff() {
    try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
            const profile = await liff.getProfile();
            lineUid = profile.userId;
            checkRegisteredUser();
        } else {
            liff.login();
        }
    } catch (err) {
        console.error("LIFF Error", err);
        checkRegisteredUser();
    }
}

function checkRegisteredUser() {
    const empId = localStorage.getItem('empId');
    if (empId) {
        document.getElementById('checkin-section').classList.remove('hidden');
        document.getElementById('user-name').innerText = localStorage.getItem('empName');
        startTracking();
    } else {
        document.getElementById('reg-section').classList.remove('hidden');
    }
    toggleLoading(false);
}

// ✅ safeFetch ของคุณ (คงไว้ 100%)
async function safeFetch(postDataObj) {
    try {
        const response = await fetch(googleAppUrl, {
            method: 'POST',
            body: JSON.stringify(postDataObj)
        });
        return await response.json();
    } catch (err) {
        console.warn("POST failed, trying GET fallback...");
        const params = new URLSearchParams(postDataObj).toString();
        const res = await fetch(`${googleAppUrl}?${params}`);
        return await res.json();
    }
}

async function verifyEmployee() {
    const id = document.getElementById('reg-id')?.value.trim();
    if(!id) return alert("กรุณากรอกรหัสพนักงาน");
    toggleLoading(true);
    try {
        const result = await safeFetch({ action: "register", employeeId: id, lineUid: lineUid });
        if(result.success) {
            localStorage.setItem('empId', result.data.employeeId);
            localStorage.setItem('empName', result.data.name);
            localStorage.setItem('empDept', result.data.dept);
            location.reload();
        } else { alert(result.message); }
    } catch (e) { alert("ระบบขัดข้อง"); }
    finally { toggleLoading(false); }
}

async function processCheckin(status) {
    if(!confirm("ยืนยัน " + status)) return;
    toggleLoading(true);
    navigator.geolocation.getCurrentPosition(async (pos) => {
        try {
            const result = await safeFetch({
                employeeId: localStorage.getItem('empId'),
                name: localStorage.getItem('empName'),
                dept: localStorage.getItem('empDept'),
                status: status,
                coords: pos.coords.latitude + "," + pos.coords.longitude
            });
            alert(result.success ? "บันทึกสำเร็จ" : result.message);
            location.reload();
        } catch (e) { alert("บันทึกสำเร็จ (Fallback)"); location.reload(); }
        finally { toggleLoading(false); }
    });
}

function startTracking() {
    navigator.geolocation.watchPosition(pos => {
        const lat = pos.coords.latitude, lng = pos.coords.longitude;
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.marker([lat, lng]).addTo(map);
        document.getElementById('status-text').innerText = "พิกัดปัจจุบัน: " + lat.toFixed(5) + "," + lng.toFixed(5);
    }, null, { enableHighAccuracy: true });
}

function toggleLoading(show){
    const loader = document.getElementById('loading-overlay');
    if(loader) loader.style.display = show ? 'flex' : 'none';
}

window.onload = function() {
    initMap();
    initLiff();
};
</script>
<style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>
</body>
</html>
