<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>somboon VanAccessory</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; color: #1c1e21; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { background: #00796b; color: white; padding: 15px; text-align: center; font-size: 18px; font-weight: bold; flex-shrink: 0; }
        #map { flex-grow: 1; width: 100%; z-index: 1; border-bottom: 2px solid #ddd; }
        .bottom-panel { background: white; padding: 20px; border-radius: 25px 25px 0 0; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); z-index: 10; flex-shrink: 0; padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        #distance-info { text-align: center; font-size: 14px; font-weight: bold; color: #00796b; background: #e0f2f1; padding: 8px; border-radius: 20px; margin-bottom: 12px; }
        .profile-section { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .user-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid #00796b; object-fit: cover; }
        .user-details { font-size: 14px; flex-grow: 1; }
        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px 5px; border: none; border-radius: 15px; color: white; font-size: 17px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn-in { background: #28a745; box-shadow: 0 4px 0 #1e7e34; }
        .btn-out { background: #dc3545; box-shadow: 0 4px 0 #a71d2a; }
        .btn:disabled { background: #ccc !important; box-shadow: 0 4px 0 #999 !important; opacity: 0.6; }
        .btn-time { font-size: 11px; font-weight: normal; margin-top: 2px; background: rgba(0,0,0,0.1); padding: 2px 8px; border-radius: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; text-align: center; }
        #status-text { text-align: center; font-size: 13px; margin-top: 10px; font-weight: bold; display: block; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="header">somboon VanAccessory</div>
<div id="map"></div>

<div class="bottom-panel">
    <div id="distance-info">📍 ตรวจสอบตำแหน่ง...</div>

    <div id="checkin-section" class="hidden">
        <div class="profile-section">
            <img id="user-img" class="user-avatar" src="https://via.placeholder.com/50" alt="">
            <div class="user-details">
                <strong>คุณ <span id="display-name"></span></strong><br>
                <span id="display-id" style="color: #00796b; font-weight: bold;"></span>
            </div>
            <button onclick="clearData()" style="background:none; border:none; color:#007bff; font-size:12px;">🔄 แก้ไข</button>
        </div>
        <div class="btn-group">
            <button id="btn-in" class="btn btn-in" onclick="processCheckin('เข้างาน')" disabled>
                <span>เข้างาน</span>
                <span id="time-in" class="btn-time">--:--</span>
            </button>
            <button id="btn-out" class="btn btn-out" onclick="processCheckin('ออกงาน')" disabled>
                <span>ออกงาน</span>
                <span id="time-out" class="btn-time">--:--</span>
            </button>
        </div>
    </div>

    <div id="registration-form" class="hidden">
        <h3 style="margin:0 0 10px 0; text-align: center;">🛡 ตรวจสอบตัวตนพนักงาน</h3>
        <input type="text" id="reg-id" placeholder="ใส่รหัสพนักงาน (เช่น SB0001)">
        <button id="btn-verify" class="btn btn-in" style="width:100%;" onclick="verifyEmployee()">ยืนยันตัวตน</button>
    </div>

    <span id="status-text">กำลังโหลด...</span>
</div>

<script>
    const LIFF_ID = "2009617030-XtqKOyjE"; 
    const officePos = [13.862444, 100.503806]; 
    const googleAppUrl = "https://script.google.com/macros/s/AKfycbz0_6Z0zRQ_PO5ZjVEmVaICtQ_57h6BlcfG6ONMI_-EDGHrkwrclAq1sk4iiTkS4oWc/exec"; 
    const radiusLimit = 100; 

    let map, userMarker;

    window.onload = function() {
        initMap();
        initLiff();
    };

    function initMap() {
        map = L.map('map', {zoomControl: false}).setView(officePos, 17);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        L.circle(officePos, { radius: radiusLimit, color: '#00796b', fillOpacity: 0.1 }).addTo(map);
        L.circleMarker(officePos, { radius: 6, color: 'red', fillOpacity: 1 }).addTo(map);
    }

    async function initLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                document.getElementById('user-img').src = profile.pictureUrl;
            }
            checkUser();
            startTracking();
        } catch (err) { checkUser(); startTracking(); }
    }

    function checkUser() {
        const id = localStorage.getItem('empId');
        const name = localStorage.getItem('empName');
        if (id && name) {
            document.getElementById('registration-form').classList.add('hidden');
            document.getElementById('checkin-section').classList.remove('hidden');
            document.getElementById('display-id').innerText = "รหัส: " + id;
            document.getElementById('display-name').innerText = name;
            document.getElementById('time-in').innerText = localStorage.getItem('lastTimeIn') || "--:--";
            document.getElementById('time-out').innerText = localStorage.getItem('lastTimeOut') || "--:--";
        } else {
            document.getElementById('registration-form').classList.remove('hidden');
            document.getElementById('status-text').innerText = "กรุณายืนยันรหัสพนักงาน";
        }
    }

    // ฟังก์ชันตรวจสอบพนักงานจาก Sheet (แก้ไขใหม่เพื่อให้คุยกับ Apps Script สำเร็จ)
    async function verifyEmployee() {
        const id = document.getElementById('reg-id').value.trim();
        if(!id) return alert("กรุณากรอกรหัสพนักงาน");

        const btnVerify = document.getElementById('btn-verify');
        const statusTxt = document.getElementById('status-text');
        
        btnVerify.disabled = true;
        statusTxt.innerText = "⏳ กำลังตรวจสอบรหัสพนักงาน...";

        // ดึง Line UID เพื่อเอาไปบันทึกลงคอลัมน์ E ในชีตพนักงาน
        let lineUid = "";
        try {
            const profile = await liff.getProfile();
            lineUid = profile.userId;
        } catch (e) {}

        try {
            // เรียกผ่าน GET เพื่อเลี่ยงปัญหา CORS
            const resp = await fetch(`${googleAppUrl}?action=verifyEmployee&employeeId=${id}&lineUid=${lineUid}`);
            const result = await resp.json();

            if (result.success) {
                localStorage.setItem('empId', id);
                localStorage.setItem('empName', result.name);
                alert("✅ ยืนยันตัวตนสำเร็จ: คุณ " + result.name);
                location.reload();
            } else {
                alert("❌ ไม่พบรหัสพนักงานนี้ในฐานข้อมูล");
                statusTxt.innerText = "กรุณาตรวจสอบรหัสอีกครั้ง";
                btnVerify.disabled = false;
            }
        } catch (err) {
            console.error(err);
            alert("⚠️ เชื่อมต่อฐานข้อมูลไม่ได้ กรุณาตรวจสอบการ Deploy Web App");
            btnVerify.disabled = false;
        }
    }

    function startTracking() {
        navigator.geolocation.watchPosition(pos => {
            const lat = pos.coords.latitude, lng = pos.coords.longitude;
            if (userMarker) map.removeLayer(userMarker);
            userMarker = L.marker([lat, lng]).addTo(map);
            const dist = calculateDistance(lat, lng, officePos[0], officePos[1]);
            document.getElementById('distance-info').innerText = "📍 ห่างจากร้าน: " + Math.round(dist) + " เมตร";
            const btnIn = document.getElementById('btn-in'), btnOut = document.getElementById('btn-out');
            const statusTxt = document.getElementById('status-text');
            if (dist <= radiusLimit) {
                btnIn.disabled = false; btnOut.disabled = false;
                statusTxt.innerText = "✅ พร้อมบันทึก"; statusTxt.style.color = "green";
            } else {
                btnIn.disabled = true; btnOut.disabled = true;
                statusTxt.innerText = "❌ ไม่อยู่ในพื้นที่ร้าน"; statusTxt.style.color = "red";
            }
        }, null, { enableHighAccuracy: true });
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function processCheckin(status) {
        const now = new Date();
        const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        if(!confirm("ยืนยัน " + status + " ?")) return;
        document.getElementById('status-text').innerText = "⌛ กำลังบันทึก...";
        
        navigator.geolocation.getCurrentPosition(pos => {
            fetch(googleAppUrl, {
                method: 'POST', mode: 'no-cors',
                body: JSON.stringify({
                    employeeId: localStorage.getItem('empId'),
                    name: localStorage.getItem('empName'),
                    status: status,
                    coords: pos.coords.latitude + "," + pos.coords.longitude
                })
            }).then(() => {
                const key = status === 'เข้างาน' ? 'lastTimeIn' : 'lastTimeOut';
                const id = status === 'เข้างาน' ? 'time-in' : 'time-out';
                document.getElementById(id).innerText = timeStr;
                localStorage.setItem(key, timeStr);
                alert("บันทึกเรียบร้อย!");
                document.getElementById('status-text').innerText = "✅ บันทึกแล้วเมื่อ " + timeStr;
            });
        });
    }

    function clearData() { if(confirm("ล้างข้อมูล?")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
